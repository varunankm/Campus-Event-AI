services:
  - type: web
    name: campusconnect-api
    env: docker
    dockerfilePath: ./server/Dockerfile
    envVars:
      - key: MongoDB__ConnectionString
        sync: false
      - key: MongoDB__DatabaseName
        value: campusconnect
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: CampusConnectAPI
      - key: Jwt__Audience
        value: CampusConnectClient
      - key: Jwt__ExpiryHours
        value: "24"
      - key: Gemini__ApiKey
        sync: false
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
